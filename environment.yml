name: visqa
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=11.8
  - cudatoolkit=11.8
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pip:
    - opencv-python>=4.7.0
    - Pillow>=9.0.0
    - transformers>=4.35.0
    - open_clip_torch>=2.20.0
    - pycocotools>=2.0.6
    - supervision>=0.17.0
    - hydra-core>=1.3.0
    - omegaconf>=2.3.0
    - tqdm>=4.65.0
    - einops>=0.7.0
    - timm>=0.9.0
    - huggingface_hub>=0.19.0
    - pyyaml>=6.0
    - gradio>=4.0.0
    - wandb>=0.16.0
    - matplotlib>=3.7.0
    - seaborn>=0.12.0
    - jupyter>=1.0.0
    - ipywidgets>=8.0.0
    - pytest>=7.0.0
    - black>=23.0.0
    - isort>=5.12.0
    # Install these manually after env creation:
    # pip install git+https://github.com/facebookresearch/sam2.git
    # pip install groundingdino-py
