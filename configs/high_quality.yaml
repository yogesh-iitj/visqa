pipeline:
  grounder: "ensemble"
  sam2_model_cfg: "sam2_hiera_large.yaml"
  frame_stride: 1
  propagation_mode: "full"
  max_objects_per_query: 5

grounding_dino:
  model_size: "swinb"
  box_threshold: 0.25
  text_threshold: 0.20

sam2:
  model_cfg: "sam2_hiera_large.yaml"
  multimask_output: true
  stability_score_thresh: 0.97
